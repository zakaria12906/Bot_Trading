# ============================================================================
# Hedged Grid Bot — Configuration
# ============================================================================
# Reverse-engineered from live bot on XAUUSDs (2026-04-13)
#
# Logic: Open BUY + SELL simultaneously. As price moves, scale the
# recovery side with 1.5× lot progression. Close entire basket when
# net P/L >= basket_tp.
# ============================================================================

general:
  magic_number: 888001
  tick_interval_sec: 0.5        # how fast the engine checks prices

# ──────────────────────────────────────────────────────────────────────────
# Symbols — one block per tradeable instrument
# ──────────────────────────────────────────────────────────────────────────
symbols:

  XAUUSDs:
    enabled: true
    base_lot: 0.01              # base lot for hedge side + first 2 levels
    max_levels: 9               # maximum grid depth (0-8)
    grid_step: 5.0              # price distance between levels (Gold points)
    basket_tp: 15.0             # close basket when net P/L >= this ($)
    lot_multiplier: 1.5         # each recovery level = prev × 1.5
    lot_step: 0.01              # broker minimum lot increment
    check_interval_sec: 0.5     # tick check frequency
    session_start_hour: 1       # UTC hour to start trading
    session_end_hour: 22        # UTC hour to stop opening new baskets

  # ── Example: EURUSD ────────────────────────────────────────────────────
  # EURUSD:
  #   enabled: false
  #   base_lot: 0.01
  #   max_levels: 8
  #   grid_step: 0.00080        # 8 pips
  #   basket_tp: 5.0
  #   lot_multiplier: 1.5
  #   lot_step: 0.01
  #   check_interval_sec: 0.5
  #   session_start_hour: 8
  #   session_end_hour: 20

  # ── Example: US30 ──────────────────────────────────────────────────────
  # US30:
  #   enabled: false
  #   base_lot: 0.01
  #   max_levels: 7
  #   grid_step: 50.0           # 50 index points
  #   basket_tp: 10.0
  #   lot_multiplier: 1.5
  #   lot_step: 0.01
  #   check_interval_sec: 0.5
  #   session_start_hour: 14
  #   session_end_hour: 21

# ──────────────────────────────────────────────────────────────────────────
# Logging
# ──────────────────────────────────────────────────────────────────────────
logging:
  level: "INFO"
  file: "logs/hedged_grid.log"
  max_bytes: 10485760           # 10 MB
  backup_count: 5
